<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="center-body">
    <div class="bg-animation" id="bg-anim"></div>
    
    <div class="glass-card entrance-anim">
        <h1 class="elegant-title">Unlock My Heart</h1>
        <p class="subtitle">Sstt... Masukkan kode rahasia kita:</p>

        <div class="hint-container">
            <span class="hint-dot" onclick="showHint(1)">?</span>
            <span class="hint-dot" onclick="showHint(2)">?</span>
            <span class="hint-dot" onclick="showHint(3)">?</span>
            <span class="hint-dot" onclick="showHint(4)">?</span>
            <span class="hint-dot" onclick="showHint(5)">?</span>
            <span class="hint-dot" onclick="showHint(6)">?</span>
        </div>

        <div id="passcode-section">
            <input type="password" id="passInput" placeholder="••••••" maxlength="6" autofocus>
            <br>
            <button id="unlockBtn">Open Gift</button>
        </div>
    </div>

    <div id="hintModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <div id="hintModal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body">
                </div>
        </div>
    </div>
</body>
</html>
